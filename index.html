<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <ul>
            <li>MyTicTacToe</li>
        </ul>
    </nav>

    <main class="gameContainer">

        <h1 class="heading">Welcome to Tic Tac Toe</h1>

        <div class="infoContainer">
            <span class="info"></span>

            <ul class="scoreCounter">
                <li>X : <span class="scoreX"></span></li>
                <li>O : <span class="scoreO"></span></li>
            </ul>
            <ul class="soundControls">
                <li><button class="sound" title="Sound">🔊</button></li>
                <li><button class="music" title="Music">🎵</button></li>
                <li><button class="restart" title="Restart Game">↻</button></li>
            </ul>
        </div>

        <div class="container">
            <div class="box bt-0 bl-0"><span class="boxtext"></span></div>
            <div class="box bt-0"><span class="boxtext"></span></div>
            <div class="box bt-0 br-0"><span class="boxtext"></span></div>
            <div class="box bl-0"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box br-0"><span class="boxtext"></span></div>
            <div class="box bb-0  bl-0"><span class="boxtext"></span></div>
            <div class="box bb-0"><span class="boxtext"></span></div>   
            <div class="box bb-0  br-0"><span class="boxtext"></span></div>
        </div>

        <button class="reset">RESET</button>

    </main>

    <script src="main.js"></script>

</body>

</html>
